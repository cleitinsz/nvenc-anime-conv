  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0a0e14;--panel:#0f1520;--panel2:#0d1220;
      --border:#1a2535;--border2:#243045;
      --accent:#00e5ff;--accent2:#ff4081;--green:#00e676;--yellow:#ffd740;
      --text:#c8d8f0;--muted:#4a6080;--muted2:#2a3a55;
      --mono:'JetBrains Mono',monospace;
    }
    body{background:var(--bg);color:var(--text);font-family:var(--mono);height:100vh;overflow:hidden;user-select:none}
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-track{background:var(--bg)}
    ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
    @keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
    @keyframes slide-in{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fade-in{from{opacity:0}to{opacity:1}}
    @keyframes glow-bar{0%,100%{opacity:1}50%{opacity:.65}}
    .log-entry{animation:slide-in .15s ease}
    .btn{cursor:pointer;border:none;outline:none;font-family:var(--mono);transition:all .15s ease}
    .btn:active{transform:scale(.97)}
    .btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
    .file-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:7px;margin-bottom:2px;border:1px solid transparent;transition:background .2s,border-color .2s}
    .file-row:hover{background:#ffffff07!important}
    .ctx-menu{position:fixed;background:#111927;border:1px solid var(--border2);border-radius:8px;padding:4px;z-index:999;box-shadow:0 8px 32px #00000099;min-width:170px;animation:fade-in .1s ease}
    .ctx-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:5px;font-size:11px;cursor:pointer;color:var(--text);transition:background .1s;font-family:var(--mono);border:none;background:none;width:100%;text-align:left}
    .ctx-item:hover{background:#ffffff0f}
    .toast-wrap{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:6px;z-index:1000}
  </style>
</head>

const LanguageContext = React.createContext();

function LanguageProvider({ children, lang, setLang }) {
  const t = (key) => {
    const val = TRANSLATIONS[lang]?.[key];
    return val !== undefined ? val : key;
  };
  return (
    <LanguageContext.Provider value={{ t, lang, setLang }}>
      {children}
    </LanguageContext.Provider>
  );
}

function useT() {
  return React.useContext(LanguageContext);
}

// ── Comparison hook ──────────────────────────────────────────
function useComparison() {
  const [state, setState]   = useState("idle"); // idle | generating | done | error
  const [progress, setProgress] = useState({ stage: "", pct: 0 });
  const [frames, setFrames]  = useState(null);   // { orig, conv }
  const [error, setError]    = useState(null);

  useEffect(() => {
    function onProgress(p) { setProgress(p); }
    function onDone(f) {
      setFrames({ orig: f.frameOrig, conv: f.frameConv });
      setState("done");
    }
    function onErr(e) {
      setError(e.message || "Erro desconhecido");
      setState("error");
    }
    window.api.on("preview-progress", onProgress);
    window.api.on("preview-done", onDone);
    window.api.on("preview-error", onErr);
    return () => {
      window.api.off("preview-progress");
      window.api.off("preview-done");
      window.api.off("preview-error");
    };
  }, []);

  async function generate(fullPath, timestampPct, config) {
    if (!fullPath) return;
    setState("generating");
    setProgress({ stage: "Iniciando...", pct: 0 });
    setError(null);
    setFrames(null);
    try {
      const result = await window.api.generatePreview(fullPath, timestampPct, config);
      setFrames({ orig: result.frameConv, conv: result.frameOrig });
      setState("done");
    } catch (err) {
      setError(err.message || "Erro desconhecido");
      setState("error");
    }
  }

  function reset() {
    setState("idle");
    setProgress({ stage: "", pct: 0 });
    setFrames(null);
    setError(null);
  }

  return { state, progress, frames, error, generate, reset };
}

// ── Comparison Slider ─────────────────────────────────────────
function ComparisonSlider({ orig, conv, viewMode }) {
  const [pos, setPos] = useState(50); // percentage 0-100
  const containerRef = useRef(null);
  const dragging = useRef(false);

  function handleMouseDown(e) {
    dragging.current = true;
    updatePos(e);
  }

  function handleMouseMove(e) {
    if (!dragging.current) return;
    updatePos(e);
  }

  function handleMouseUp() {
    dragging.current = false;
  }

  function updatePos(e) {
    if (!containerRef.current) return;
    const rect = containerRef.current.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const pct = Math.max(0, Math.min(100, (x / rect.width) * 100));
    setPos(pct);
  }

  useEffect(() => {
    function onMove(e) { handleMouseMove(e); }
    function onUp()    { handleMouseUp(); }
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
    return () => {
      window.removeEventListener("mousemove", onMove);
      window.removeEventListener("mouseup", onUp);
    };
  }, []);

  const containerStyle = viewMode === "zoom"
    ? { width: "auto", height: "auto", cursor: "ew-resize" }
    : { width: "100%", maxHeight: viewMode === "fullscreen" ? "75vh" : "400px", cursor: "ew-resize" };

  const objectFit = viewMode === "zoom" ? "none" : "contain";

  return (
    <div
      ref={containerRef}
      onMouseDown={handleMouseDown}
      style={{
        position: "relative",
        overflow: viewMode === "zoom" ? "auto" : "hidden",
        background: "#000",
        borderRadius: 8,
        userSelect: "none",
        ...containerStyle,
      }}
    >
      {/* Original (left half) */}
      <img
        src={`data:image/png;base64,${orig}`}
        alt="Original"
        style={{
          display: "block",
          width: "100%",
          height: viewMode === "zoom" ? "auto" : "100%",
          objectFit,
          pointerEvents: "none",
        }}
      />

      {/* Converted (right half, clipped) */}
      <div style={{
        position: "absolute",
        top: 0, left: 0, right: 0, bottom: 0,
        clipPath: `inset(0 ${100 - pos}% 0 0)`,
      }}>
        <img
          src={`data:image/png;base64,${conv}`}
          alt="Convertido"
          style={{
            display: "block",
            width: "100%",
            height: "100%",
            objectFit,
            pointerEvents: "none",
          }}
        />
      </div>

      {/* Divider line */}
      <div style={{
        position: "absolute",
        top: 0,
        bottom: 0,
        left: `${pos}%`,
        width: 3,
        background: "rgba(255,255,255,0.8)",
        transform: "translateX(-50%)",
        boxShadow: "0 0 8px rgba(255,255,255,0.5)",
        pointerEvents: "none",
      }} />

      {/* Handle */}
      <div style={{
        position: "absolute",
        top: "50%",
        left: `${pos}%`,
        transform: "translate(-50%, -50%)",
        width: 32, height: 32,
        background: "rgba(255,255,255,0.9)",
        borderRadius: "50%",
        display: "flex",
        alignItems: "center",
        justifyContent: "center",
        fontSize: 14,
        boxShadow: "0 2px 8px rgba(0,0,0,0.4)",
        pointerEvents: "none",
      }}>
        ⬌
      </div>
    </div>
  );
}

// ── Context menu ─────────────────────────────────────────────
function ContextMenu({x,y,items,onClose}) {
  const ref = useRef(null);
  useEffect(()=>{
    function handler(e){ if(ref.current&&!ref.current.contains(e.target)) onClose(); }
    document.addEventListener("mousedown",handler);
    return ()=>document.removeEventListener("mousedown",handler);
  },[onClose]);
  return (
    <div ref={ref} className="ctx-menu" style={{top:y,left:x}}>
      {items.map((item,i)=>
        item === "---"
          ? <div key={i} style={{height:1,background:"var(--border)",margin:"3px 0"}}/>
          : <button key={i} className="ctx-item" onClick={()=>{item.action();onClose();}}>
              <span style={{fontSize:13}}>{item.icon}</span>
              <span>{item.label}</span>
            </button>
      )}
    </div>
  );
}

// ── Slots ativos com fps/speed/bitrate ──────────────────────

function ActiveSlots({slots, totalConversoes}) {
  const { t } = useT();
  const active = Object.values(slots).filter(s=>s.name);
  if (active.length===0) return null;
  return (
    <div style={{borderBottom:"1px solid var(--border)",padding:"10px 14px",
      background:"#0b1219",display:"flex",gap:10}}>
      {active.map(slot=>(
        <div key={slot.slotId} style={{flex:1,background:"var(--panel)",
          border:"1px solid #00e5ff22",borderRadius:9,padding:"11px 13px",
          boxShadow:"0 0 24px #00e5ff08"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
            <div style={{fontSize:9,color:"var(--accent)",letterSpacing:2,fontWeight:800,display:"flex",alignItems:"center",gap:6}}>
              <span style={{width:6,height:6,borderRadius:"50%",background:"var(--accent)",
                display:"inline-block",boxShadow:"0 0 6px var(--accent)",
                animation:"pulse-dot 2s infinite"}}/>
              SLOT {slot.slotId}
              <span style={{color:"var(--muted)",fontWeight:400}}>{slot.id}/{totalConversoes}</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              {slot.fps    && <span style={{fontSize:9,color:"#7ecfff"}}>{slot.fps}</span>}
              {slot.speed  && <span style={{fontSize:9,color:"var(--yellow)",fontWeight:700}}>{slot.speed}</span>}
              {slot.bitrate&& <span style={{fontSize:9,color:"var(--muted)"}}>{slot.bitrate}</span>}
              <span style={{fontSize:9,color:"var(--muted)"}}>{t("slotEta")} {slot.eta||"--:--"}</span>
            </div>
          </div>
          <div style={{fontSize:10,color:"var(--text)",marginBottom:7,
            whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
            {slot.name}
          </div>
          <ProgressBar pct={slot.progress||0} glow height={6}/>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:5}}>
            <span style={{fontSize:9,color:"var(--muted)"}}>CQ {slot.cq}</span>
            <span style={{fontSize:10,color:"var(--accent)",fontWeight:800}}>{slot.progress||0}%</span>
          </div>
        </div>
      ))}
    </div>
  );
}

// ── Lista de arquivos com busca + context menu ───────────────

function FileList({files, filter, setFilter}) {
  const { t } = useT();
  const [search,  setSearch]  = useState("");
  const [ctxMenu, setCtxMenu] = useState(null);

  const counts = useMemo(()=>({
    all:       files.filter(f=>!["done_skip","hevc_skip"].includes(f.status)).length,
    queue:     files.filter(f=>f.status==="queue").length,
    converting:files.filter(f=>f.status==="converting").length,
    done:      files.filter(f=>f.status==="done").length,
    error:     files.filter(f=>f.status==="error").length,
  }),[files]);

  const filtered = useMemo(()=>{
    let list = files.filter(f=>!["done_skip","hevc_skip"].includes(f.status));
    if (filter!=="all") list = list.filter(f=>f.status===filter);
    if (search.trim())  list = list.filter(f=>f.name.toLowerCase().includes(search.toLowerCase()));
    return list;
  },[files,filter,search]);

  const FILTER_META = {
    all:       {label:t("filterAll"),      color:"var(--text)"},
    queue:     {label:t("filterQueue"),    color:"var(--yellow)"},
    converting:{label:t("filterEncoding"), color:"var(--accent)"},
    done:      {label:t("filterDone"),     color:"var(--green)"},
    error:     {label:t("filterErrors"),   color:"var(--accent2)"},
  };

  function openCtx(e,file){
    e.preventDefault();
    setCtxMenu({x:e.clientX,y:e.clientY,file});
  }

  function ctxItems(file){
    return [
      {icon:"🔍",label:t("ctxCompare"),action:()=>window.openPreviewModal?.(file)},
      {icon:"📂",label:t("ctxOpenFolder"),action:()=>window.api?.openPath?.(file.dir)},
      {icon:"📋",label:t("ctxCopyPath"),action:()=>navigator.clipboard.writeText(file.fullPath)},
    ];
  }

  return (
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      {/* Toolbar */}
      <div style={{display:"flex",alignItems:"center",gap:8,padding:"7px 14px",
        borderBottom:"1px solid var(--border)"}}>
        <div style={{display:"flex",gap:3,flex:1,flexWrap:"wrap"}}>
          {Object.entries(FILTER_META).map(([id,meta])=>{
            const active = filter===id;
            const count  = counts[id];
            return (
              <button key={id} className="btn" onClick={()=>setFilter(id)} style={{
                padding:"4px 9px",borderRadius:5,fontSize:10,fontWeight:700,
                background:active?`${meta.color}18`:"transparent",
                border:`1px solid ${active?meta.color:"transparent"}`,
                color:active?meta.color:"var(--muted)",
                display:"flex",alignItems:"center",gap:5}}>
                {meta.label}
                <span style={{
                  background:active?`${meta.color}22`:"var(--muted2)",
                  color:active?meta.color:"var(--muted)",
                  borderRadius:99,padding:"1px 6px",fontSize:9,fontWeight:800,minWidth:18,textAlign:"center"}}>
                  {count}
                </span>
              </button>
            );
          })}
        </div>
        <div style={{position:"relative"}}>
          <span style={{position:"absolute",left:8,top:"50%",transform:"translateY(-50%)",
            fontSize:11,color:"var(--muted)",pointerEvents:"none"}}>🔍</span>
          <input
            value={search} onChange={e=>setSearch(e.target.value)}
            placeholder={t("searchPlaceholder")}
            style={{background:"#05090f",border:"1px solid var(--border)",borderRadius:6,
              padding:"5px 8px 5px 26px",color:"var(--text)",fontSize:10,
              fontFamily:"var(--mono)",width:180,outline:"none"}}
          />
          {search && (
            <button className="btn" onClick={()=>setSearch("")}
              style={{position:"absolute",right:6,top:"50%",transform:"translateY(-50%)",
                background:"none",border:"none",color:"var(--muted)",fontSize:12,padding:0}}>
              ✕
            </button>
          )}
        </div>
      </div>

      {/* Lista */}
      <div style={{flex:1,overflowY:"auto",padding:"5px 8px"}}
        onClick={()=>setCtxMenu(null)}>
        {filtered.length===0 && (
          <div style={{textAlign:"center",color:"var(--muted)",fontSize:11,padding:40}}>
            {search ? t("noResults")(search) : t("noFiles")}
          </div>
        )}
        {filtered.map((f,i)=>(
          <div key={f.fullPath||i} className="file-row"
            onContextMenu={e=>openCtx(e,f)}
            style={{
              background:f.status==="converting"?"#00e5ff07":
                         f.status==="error"?"#ff408107":
                         f.status==="done"?"#00e67605":"transparent",
              borderColor:f.status==="converting"?"#00e5ff1a":
                          f.status==="error"?"#ff40811a":
                          f.status==="done"?"#00e67618":"transparent"}}>
            <Badge status={f.status}/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:10,
                color:f.status==="error"?"var(--accent2)":
                      f.status==="done"?"var(--text)":"var(--text)",
                whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",
                marginBottom:f.status==="converting"?5:0}}>
                {f.name}
              </div>
              {f.status==="converting" && <ProgressBar pct={f.progress||0} height={4} glow/>}
            </div>
            <div style={{display:"flex",gap:8,alignItems:"center",flexShrink:0,fontSize:10}}>
              {f.status==="done"&&f.mb2!=null ? (
                <>
                  <span style={{color:"var(--muted)",fontSize:9}}>{f.mb1} MB</span>
                  <span style={{color:"var(--muted)"}}>→</span>
                  <span style={{color:"var(--green)",fontWeight:700}}>{f.mb2} MB</span>
                  <span style={{color:"var(--green)",fontWeight:800,background:"#00e67614",border:"1px solid #00e67630",borderRadius:4,padding:"1px 6px",fontSize:9}}>
                    -{f.reducao}%
                  </span>
                </>
              ) : f.status==="converting" ? (
                <span style={{color:"var(--accent)",fontSize:9}}>{t("slotEta")} {f.eta||"--:--"}</span>
              ) : (
                <span style={{color:"var(--muted)",fontSize:9}}>
                  {f.size?(f.size/1048576).toFixed(1)+" MB":""}
                </span>
              )}
              <span style={{color:"var(--muted2)",fontSize:9}}>CQ{f.cq||"?"}</span>
            </div>
          </div>
        ))}
      </div>

      {ctxMenu && (
        <ContextMenu
          x={ctxMenu.x} y={ctxMenu.y}
          items={ctxItems(ctxMenu.file)}
          onClose={()=>setCtxMenu(null)}
        />
      )}
    </div>
  );
}

// ── Log viewer com auto-scroll e pin ─────────────────────────

function LogViewer({logs}) {
  const { t } = useT();
  const ref = useRef(null);
  const [pinned, setPinned] = useState(true);
  const LVL = {OK:"var(--green)",ERRO:"var(--accent2)",AVISO:"var(--yellow)",DEBUG:"var(--muted)",INFO:"var(--text)"};

  useEffect(()=>{
    if (pinned && ref.current) ref.current.scrollTop = ref.current.scrollHeight;
  },[logs,pinned]);

  return (
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <div style={{display:"flex",justifyContent:"flex-end",alignItems:"center",
        padding:"5px 14px",borderBottom:"1px solid var(--border)",gap:8}}>
        <span style={{fontSize:9,color:"var(--muted)"}}>{t("logLines")(logs.length)}</span>
        <button className="btn" onClick={()=>setPinned(p=>!p)} style={{
          background:pinned?"#00e5ff18":"transparent",
          border:`1px solid ${pinned?"var(--accent)":"var(--border)"}`,
          color:pinned?"var(--accent)":"var(--muted)",
          borderRadius:5,padding:"3px 8px",fontSize:9,fontWeight:700}}>
          {pinned ? t("logPinned") : t("logPin")}
        </button>
      </div>
      <div ref={ref} onScroll={e=>{
        const el=e.target;
        const atBottom=el.scrollHeight-el.scrollTop-el.clientHeight<20;
        setPinned(atBottom);
      }} style={{flex:1,overflowY:"auto",padding:"8px 14px",fontSize:11}}>
        {logs.map((l,i)=>(
          <div key={i} className="log-entry"
            style={{display:"flex",gap:8,marginBottom:2,lineHeight:1.7}}>
            <span style={{color:"var(--muted)",flexShrink:0,fontSize:10}}>{l.t}</span>
            <span style={{color:LVL[l.lvl]||"var(--text)",fontWeight:700,
              flexShrink:0,minWidth:38,fontSize:10,letterSpacing:.5}}>
              [{l.lvl}]
            </span>
            <span style={{color:"var(--text)"}}>{l.msg}</span>
          </div>
        ))}
        {logs.length===0&&(
          <div style={{color:"var(--muted)",fontSize:11,marginTop:16}}>
            {t("logWaiting")}
          </div>
        )}
      </div>
    </div>
  );
}

// ── Comparison Modal ──────────────────────────────────────────
function ComparisonModal({ file, config, onClose }) {
  const { t } = useT();
  const [viewMode, setViewMode] = useState("single");
  const [timestamp, setTimestamp] = useState(30);
  const { state, progress, frames, error, generate, reset } = useComparison();

  const duracao = file?.duracao || 0;
  const timestampSec = duracao > 0 ? duracao * timestamp / 100 : 0;
  const timestampLabel = formatTime(timestampSec);

  function formatTime(sec) {
    if (!sec || sec <= 0) return "0:00";
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60);
    return `${m}:${String(s).padStart(2, "0")}`;
  }

  function handleGenerate() {
    if (!file?.fullPath) return;
    generate(file.fullPath, timestamp / 100, config);
  }

  function handleClose() {
    reset();
    onClose();
  }

  return (
    <div style={{
      position: "fixed", top: 0, left: 0, right: 0, bottom: 0,
      background: "rgba(0,0,0,0.85)",
      display: "flex", alignItems: "center", justifyContent: "center",
      zIndex: 2000,
      animation: "fade-in .15s ease",
    }}>
      <div style={{
        background: "var(--panel)",
        border: "1px solid var(--border2)",
        borderRadius: 12,
        width: viewMode === "fullscreen" ? "90vw" : "700px",
        maxHeight: viewMode === "fullscreen" ? "90vh" : "85vh",
        display: "flex", flexDirection: "column",
        overflow: "hidden",
        boxShadow: "0 20px 60px rgba(0,0,0,0.7)",
      }}>
        {/* Header */}
        <div style={{
          display: "flex", alignItems: "center", justifyContent: "space-between",
          padding: "12px 16px", borderBottom: "1px solid var(--border)",
          background: "var(--panel2)",
        }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <span style={{ fontSize: 16 }}>🔍</span>
            <span style={{ fontSize: 12, fontWeight: 700, color: "var(--text)" }}>
              {t("modalTitle")}
            </span>
            <span style={{ fontSize: 10, color: "var(--muted)" }}>— {file?.name}</span>
          </div>
          <button className="btn" onClick={handleClose} style={{
            background: "none", border: "none", color: "var(--muted)",
            fontSize: 18, cursor: "pointer", padding: 4,
          }}>✕</button>
        </div>

        {/* Body */}
        <div style={{ flex: 1, overflow: "auto", padding: 16, display: "flex", flexDirection: "column", gap: 12 }}>

          {/* Timestamp selector */}
          {state !== "done" && (
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <span style={{ fontSize: 10, color: "var(--muted)", minWidth: 70 }}>{t("modalTimestamp")}</span>
              <input
                type="range"
                min={0}
                max={100}
                value={timestamp}
                onChange={e => setTimestamp(Number(e.target.value))}
                disabled={state === "generating"}
                style={{ flex: 1, accentColor: "var(--accent)" }}
              />
              <span style={{ fontSize: 10, color: "var(--accent)", minWidth: 50, textAlign: "right" }}>
                {timestamp}%
              </span>
              <span style={{ fontSize: 10, color: "var(--muted)", minWidth: 45 }}>
                ({timestampLabel})
              </span>
            </div>
          )}

          {/* Preview area */}
          <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", minHeight: 300 }}>
            {state === "idle" && (
              <div style={{ textAlign: "center", color: "var(--text)", padding: 40 }}>
                <div style={{ fontSize: 48, marginBottom: 12 }}>🔍</div>
                <div style={{ fontSize: 12, marginBottom: 16 }}>
                  {t("modalIdle")}
                </div>
                <div style={{ fontSize: 10, color: "var(--muted)" }}>
                  {t("modalTimestampAt")(timestamp, timestampLabel)}
                </div>
              </div>
            )}

            {state === "generating" && (
              <div style={{ textAlign: "center", width: "100%", maxWidth: 300 }}>
                <div style={{ fontSize: 11, color: "var(--accent)", marginBottom: 8 }}>
                  {progress.stage || t("modalProcessing")}
                </div>
                <ProgressBar pct={progress.pct || 0} glow />
                <div style={{ fontSize: 9, color: "var(--muted)", marginTop: 6 }}>
                  {progress.pct || 0}%
                </div>
              </div>
            )}

            {state === "done" && frames ? (
              frames.orig && frames.conv ? (
                <ComparisonSlider orig={frames.orig} conv={frames.conv} viewMode={viewMode} />
              ) : (
                <div style={{ color: "var(--accent2)", textAlign: "center", fontSize: 11 }}>
                  {t("modalEmptyFrames")}
                </div>
              )
            ) : null}

            {state === "error" && (

  );

function LangRoot() {
  const [lang, setLang] = useState("ptBR");
  return (
    <LanguageProvider lang={lang} setLang={setLang}>
      <App />
    </LanguageProvider>
  );
}

function App() {
  const { t, lang, setLang } = useT();
  const [cfg,       setCfg]      = useState({gpu:0,preset:"p6",jobs:2,cqHD:28,cqSD:26,deletarOriginal:false,profile:"anime",encoder:"nvenc",cpuPreset:"medium",outputRes:"original"});
  const [folder,    setFolder]   = useState(null);
  const [outputFolder, setOutputFolder] = useState(null);
  const [files,     setFiles]    = useState([]);
  const [slots,     setSlots]    = useState({});
  const [logs,      setLogs]     = useState([]);
  const [stats,     setStats]    = useState({
    done:0, errors:0, active:0, queue:0,
    ganhoGB:"0.00", globalEta:"",
    quarantine:0, noGain:0, retries:0,
  });
  const [quarantineFirstPath, setQuarantineFirstPath] = useState(null);
  const [running,   setRunning]  = useState(false);
  const [scanning,  setScanning] = useState(false);
  const [scanProg,  setScanProg] = useState(null);
  const [tab,       setTab]      = useState("files");
  const [filter,    setFilter]   = useState("all");
  const [toasts,    setToasts]   = useState([]);
  const [previewFile, setPreviewFile] = useState(null);
  const [builtinPresets, setBuiltinPresets] = useState([]);
  const [activePresetId, setActivePresetId] = useState(null);
  const [savePresetModal, setSavePresetModal] = useState(null);
  const [editPresetModal, setEditPresetModal] = useState(null);

  // Quebra o ciclo config-loaded → setCfg → useEffect → setConfig → emitConfigLoaded → ...
  // Quando server manda config-loaded, marca essa flag pra próximo useEffect skipar o echo back.
  const skipNextSetConfig = useRef(false);
  // Bloqueia o envio inicial de setConfig antes do server hidratar o renderer com
  // o config do disco — evita sobrescrever lang/customPresets/etc com defaults do React.
  const hydrated = useRef(false);

  const totalConversoes = files.filter(f=>!["done_skip","hevc_skip"].includes(f.status)).length;
  const totalQueue      = files.filter(f=>f.status==="queue").length;
  const errorFiles      = files.filter(f=>f.status==="error");

  const addLog     = useCallback((e)=>setLogs(p=>[...p.slice(-500),e]),[]);
  const updateFile = useCallback((fullPath,update)=>{
    setFiles(p=>p.map(f=>f.fullPath===fullPath?{...f,...update}:f));
  },[]);

  function addToast(msg,icon="✓",color="var(--green)") {
    const id = Date.now();
    setToasts(p=>[...p.slice(-3),{id,msg,icon,color}]);
    setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),4000);
  }

  // Horário de término estimado
  function etaHorario(etaStr) {
    if (!etaStr) return null;
    const match = etaStr.match(/(\d+)h\s*(\d+)min|(\d+)min\s*(\d+)s|(\d+)s/);
    if (!match) return null;
    let seg = 0;
    if (match[1]) seg = parseInt(match[1])*3600 + parseInt(match[2])*60;
    else if (match[3]) seg = parseInt(match[3])*60 + parseInt(match[4]);
    else if (match[5]) seg = parseInt(match[5]);
    const fim = new Date(Date.now() + seg*1000);
    return fim.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
  }

  // IPC listeners
  useEffect(()=>{
    window.api.on("config-loaded", (payload) => {
      const { _builtinPresets, _activePresetId, ...c } = payload;
      hydrated.current = true;
      skipNextSetConfig.current = true;
      setCfg(prev => ({...prev, ...c}));
      setBuiltinPresets(_builtinPresets || []);
      setActivePresetId(_activePresetId || null);
      if (c.lastFolder)   setFolder(c.lastFolder);
      if (c.outputFolder) setOutputFolder(c.outputFolder);
      if (c.lang)         setLang(c.lang);
    });
    window.api.on("log",           addLog);
    window.api.on("stats",         setStats);
    window.api.on("scan-progress", setScanProg);
    window.api.on("slot-update",  (d)=>setSlots(p=>({...p,[d.slotId]:d})));
    window.api.on("slot-clear",   ({slotId})=>setSlots(p=>{const n={...p};delete n[slotId];return n;}));
    window.api.on("file-status",  (d)=>{
      updateFile(d.fullPath,d);
      if (d.status==="done")  addToast(t("toastDone")(d.fullPath?.split(/[\\/]/).pop()), "✓", "var(--green)");
      if (d.status==="error") addToast(t("toastError")(d.fullPath?.split(/[\\/]/).pop()), "✕", "var(--accent2)");
    });
    window.api.on("reset-converting",()=>{
      setFiles(p=>p.map(f=>f.status==="converting"?{...f,status:"queue",progress:0}:f));
      setSlots({});
    });
    window.api.on("conversion-done",(d)=>{
      setRunning(false);
      setQuarantineFirstPath(d.quarantineFirstPath || null);
      addLog({t:new Date().toLocaleTimeString(t("locale"),{hour12:false}),lvl:"OK",
        msg: t("logSessionDone")(d.convertidos, d.erros, d.ganhoGB)});
      addToast(t("toastSession")(d.convertidos, d.ganhoGB), "🏁", "var(--accent)");
    });
    window.openPreviewModal = (file) => setPreviewFile(file);
    return ()=>{
      ["config-loaded","log","stats","scan-progress","slot-update","slot-clear",
       "file-status","reset-converting","conversion-done"].forEach(c=>window.api.off(c));
    };
  },[addLog,updateFile]);

  // Sincroniza cfg+lang com o main. Único useEffect (em vez de 2 separados)
  // pra evitar race condition entre eles. Hydration gate evita sobrescrever
  // config do disco no primeiro render. skip-ref evita o ciclo de echo.
  useEffect(() => {
    if (!hydrated.current) return;
    if (skipNextSetConfig.current) {
      skipNextSetConfig.current = false;
      return;
    }
    window.api.setConfig({...cfg, lang});
  }, [cfg, lang]);

function handleOpenSaveModal() {
    const PRESET_FIELDS_RENDERER = ["profile","encoder","outputRes","cqHD","cqSD","preset","cpuPreset","jobs","sufixo"];
    const snapshot = Object.fromEntries(PRESET_FIELDS_RENDERER.map(k => [k, cfg[k]]));
    setSavePresetModal({ snapshot });
  }

  async function handleSavePreset({ name, icon, description }) {
    const r = await window.api.savePresetFromConfig(name, icon, description);
    if (r?.ok) {
      addToast(t("presetSaveSuccess")(name), "✓", "var(--green)");
      setSavePresetModal(null);
    } else if (r?.reason === "name_required") {
      addToast(t("presetNameRequired"), "✕", "var(--accent2)");
    }
  }

  async function handleApplyPreset(preset) {
    if (running) {
      addToast(t("presetApplyWhileConverting"), "⏸", "var(--yellow)");
      return;
    }
    const r = await window.api.applyPreset(preset.id);
    if (r?.ok) {
      const name = typeof preset.name === "string" ? preset.name
                 : (preset.name?.[lang] || preset.name?.ptBR || "");
      addToast(t("presetApplySuccess")(name), "✓", "var(--green)");
    }
  }

  async function handleDeletePreset(preset) {
    if (preset.builtin) {
      addToast(t("presetCannotDeleteBuiltin"), "✕", "var(--accent2)");
      return;
    }
    const name = typeof preset.name === "string" ? preset.name : (preset.name?.[lang] || "?");
    if (!window.confirm(t("presetDeleteConfirm")(name))) return;
    const r = await window.api.deletePreset(preset.id);
    if (r?.ok) addToast(t("presetDeleteSuccess")(name), "✓", "var(--green)");
  }

  async function handleEditPreset({ name, icon, description }) {
    const target = editPresetModal;
    await window.api.applyPreset(target.id);
    await window.api.deletePreset(target.id);
    await window.api.savePresetFromConfig(name, icon, description);
    addToast(t("presetSaveSuccess")(name), "✓", "var(--green)");
    setEditPresetModal(null);
  }

  async function handleSelectFolder() {
    const p = await window.api.selectFolder();
    if (!p) return;
    setFolder(p); setFiles([]); setLogs([]);
    setStats({done:0,errors:0,active:0,queue:0,ganhoGB:"0.00",globalEta:"",
              quarantine:0,noGain:0,retries:0});
    setSlots({}); setScanProg(null); setScanning(true);
    addLog({t:now(),lvl:"INFO",msg: t("logFolder")(p)});
    addLog({t:now(),lvl:"INFO",msg: t("logScanning")});
    const result = await window.api.scanFolder(p);
    setFiles(result); setScanning(false); setScanProg(null);
    const q    = result.filter(f=>f.status==="queue").length;
    const skip = result.filter(f=>["done_skip","hevc_skip"].includes(f.status)).length;
    addLog({t:now(),lvl:"INFO",msg: t("logScanResult")(result.length, q, skip)});
  }

  function now(){ return new Date().toLocaleTimeString(t("locale"),{hour12:false}); }

  function etaHorario(etaStr) {
    if (!etaStr) return null;
    const match = etaStr.match(/(\d+)h\s*(\d+)min|(\d+)min\s*(\d+)s|(\d+)s/);
    if (!match) return null;
    let seg = 0;
    if (match[1]) seg = parseInt(match[1])*3600 + parseInt(match[2])*60;
    else if (match[3]) seg = parseInt(match[3])*60 + parseInt(match[4]);
    else if (match[5]) seg = parseInt(match[5]);
    const fim = new Date(Date.now() + seg*1000);
    return fim.toLocaleTimeString(t("locale"),{hour:"2-digit",minute:"2-digit"});
  }

  function now(){ return new Date().toLocaleTimeString("pt-BR",{hour12:false}); }

  async function handleSelectOutputFolder() {
    const p = await window.api.selectOutputFolder();
    if (!p) return;
    setOutputFolder(p);
  }

  function handleStart(){ setRunning(true); window.api.startConversion(files); }
  function handleStop() { window.api.stopConversion(); setRunning(false); }
  function handleRetry(){
    if (errorFiles.length===0) return;
    window.api.retryErrors(errorFiles);
    setRunning(true);
  }

  const donePct   = totalConversoes>0 ? Math.round(stats.done/totalConversoes*100) : 0;
  const horarioFim = running ? etaHorario(stats.globalEta) : null;

  const allPresets = useMemo(
    () => [...builtinPresets, ...(cfg.customPresets || [])],
    [builtinPresets, cfg.customPresets]
  );
  const activePreset = useMemo(
    () => activePresetId ? allPresets.find(p => p.id === activePresetId) : null,
    [activePresetId, allPresets]
  );

  function getPresetName(p) {
    if (!p) return null;
    if (typeof p.name === "string") return p.name;
    return p.name?.[lang] || p.name?.ptBR || p.name?.en || "?";
  }

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100vh",overflow:"hidden"}}>

      {/* Header */}
      <div style={{height:44,borderBottom:"1px solid var(--border)",
        display:"flex",alignItems:"center",padding:"0 14px",gap:12,
        background:"var(--panel2)",WebkitAppRegion:"drag"}}>
        <div style={{width:72}}/>

        {folder && (
          <div style={{display:"flex",alignItems:"center",gap:10,flex:1}}>
            <div style={{flex:1,maxWidth:300}}>
              <ProgressBar pct={donePct} glow={running} height={7}/>
            </div>
            <span style={{fontSize:11,color:"var(--accent)",fontWeight:800,minWidth:34}}>{donePct}%</span>
            <span style={{fontSize:10,color:"var(--muted)"}}>{stats.done}/{totalConversoes}</span>
            {stats.globalEta && running && (
              <span style={{fontSize:10,color:"var(--yellow)",fontWeight:700,
                background:"#ffd74014",border:"1px solid #ffd74033",
                borderRadius:4,padding:"2px 10px",display:"flex",alignItems:"center",gap:6}}>
                <span>⏱ {stats.globalEta}</span>
                {horarioFim && <span style={{color:"var(--muted)",fontWeight:400}}>· fim ~{horarioFim}</span>}
              </span>
            )}
          </div>
        )}

        <div style={{flex:1}}/>

        <div style={{display:"flex",alignItems:"center",gap:12,WebkitAppRegion:"no-drag",marginRight:250}}>
          <div style={{width:7,height:7,borderRadius:"50%",
            background:running?"var(--green)":scanning?"var(--yellow)":"var(--muted)",
            boxShadow:running?"0 0 8px var(--green)":"none",
            animation:(running||scanning)?"pulse-dot 2s infinite":"none"}}/>
          <span style={{fontSize:9,letterSpacing:1.5,color:"var(--muted)"}}>
            {running ? t("statusConverting") : scanning ? t("statusScanning") : t("statusReady")}
          </span>
          <LangToggle lang={lang} onToggle={()=>setLang(l=>l==="ptBR"?"en":"ptBR")}/>
        </div>
      </div>

      {/* Body */}
      <div style={{flex:1,display:"flex",overflow:"hidden"}}>
        <SettingsPanel
          cfg={cfg} onChange={setCfg}
          onSelectFolder={handleSelectFolder}
          onStart={handleStart} onStop={handleStop} onRetry={handleRetry}
          onSelectOutputFolder={handleSelectOutputFolder}
          running={running} scanning={scanning}
          folder={folder} outputFolder={outputFolder} totalQueue={totalQueue} errorCount={errorFiles.length}
          activePreset={activePreset} getPresetName={getPresetName} onClickPresetBadge={()=>setTab("presets")}
        />

        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
          {!folder && !scanning ? (
            <EmptyState onSelect={handleSelectFolder}/>
          ) : scanning ? (
            <ScanScreen scanProg={scanProg}/>
          ) : (
            <>
              {/* Stats */}
              <div style={{borderBottom:"1px solid var(--border)",padding:"9px 14px",display:"flex",gap:7}}>
                <StatCard label={t("statTotal")}     value={totalConversoes}       sub={t("statFiles")}/>
                <StatCard label={t("statConverted")} value={stats.done}            sub={t("statConvertedSub")(totalConversoes)} color="var(--green)"/>
                <StatCard label={t("statEncoding")}  value={stats.active}          sub={t("statSlots")} color="var(--accent)"/>
                <StatCard label={t("statErrors")}    value={stats.errors}          sub={t("statFiles")} color={stats.errors>0?"var(--accent2)":"var(--muted)"}/>
                <StatCard label={t("statSaved")}     value={`${stats.ganhoGB} GB`} sub={t("statFreed")} color="var(--yellow)"/>
                {stats.quarantine > 0 && (
                  <StatCard label={t("statQuarantine")} value={stats.quarantine}
                            sub={t("statQuarantineSub")} color="#ff8800"/>
                )}
                {stats.noGain > 0 && (
                  <StatCard label={t("statNoGain")} value={stats.noGain}
                            sub={t("statNoGainSub")} color="var(--muted)"/>
                )}
                {stats.retries > 0 && (
                  <StatCard label={t("statRetries")} value={stats.retries}
                            sub={t("statRetriesSub")} color="var(--yellow)"/>
                )}
                {quarantineFirstPath && !running && (
                  <button className="btn" onClick={() => window.api.openQuarantineFolder(quarantineFirstPath)}
                          style={{padding:"8px 12px",fontSize:10,fontWeight:700,
                                  background:"#ff880022",color:"#ff8800",
                                  border:"1px solid #ff880055",borderRadius:6,letterSpacing:1}}>
                    {t("btnOpenQuarantine")}
                  </button>
                )}
              </div>

              <ActiveSlots slots={slots} totalConversoes={totalConversoes}/>

              {/* Tabs */}
              <div style={{borderBottom:"1px solid var(--border)",display:"flex",padding:"0 14px"}}>
                {[["files", t("tabFiles")], ["log", t("tabLog")], ["presets", t("tabPresets")]].map(([id,lbl])=>(
                  <button key={id} className="btn" onClick={()=>setTab(id)} style={{
                    padding:"8px 13px",fontSize:11,background:"transparent",border:"none",
                    fontWeight:tab===id?700:400,
                    color:tab===id?"var(--accent)":"var(--muted)",
                    borderBottom:`2px solid ${tab===id?"var(--accent)":"transparent"}`,
                    transition:"all .15s"}}>
                    {lbl}
                  </button>
                ))}
              </div>

              {tab==="files" && <FileList files={files} filter={filter} setFilter={setFilter}/>}
              {tab==="log"   && <LogViewer logs={logs}/>}
              {tab==="presets" && (
                <div style={{padding:"12px 14px",overflowY:"auto",height:"100%"}}>
                  <div style={{fontSize:10,fontWeight:800,letterSpacing:1,color:"var(--muted)",marginBottom:8}}>
                    {t("presetsBuiltIn")}
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(220px, 1fr))",gap:8,marginBottom:18}}>
                    {builtinPresets.map(p => (
                      <PresetCard key={p.id} preset={p} isActive={p.id===activePresetId}
                                  lang={lang} t={t}
                                  onApply={handleApplyPreset} onEdit={()=>{}} onDelete={handleDeletePreset}/>
                    ))}
                  </div>

                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                    <div style={{fontSize:10,fontWeight:800,letterSpacing:1,color:"var(--muted)"}}>
                      {t("presetsCustom")}
                    </div>
                    <button className="btn"
                            style={{padding:"5px 10px",fontSize:10,fontWeight:700,
                                    background:"var(--accent)22",color:"var(--accent)",
                                    border:"1px solid var(--accent)55",borderRadius:5}}
                            onClick={handleOpenSaveModal}>
                      {t("btnSaveAsPreset")}
                    </button>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(220px, 1fr))",gap:8}}>
                    {(cfg.customPresets || []).map(p => (
                      <PresetCard key={p.id} preset={p} isActive={p.id===activePresetId}
                                  lang={lang} t={t}
                                  onApply={handleApplyPreset} onEdit={(p)=>setEditPresetModal(p)} onDelete={handleDeletePreset}/>
                    ))}
                    {(!cfg.customPresets || cfg.customPresets.length===0) && (
                      <div style={{color:"var(--muted)",fontSize:11,fontStyle:"italic",padding:"12px 0"}}>
                        — {t("presetCustom")} —
                      </div>
                    )}
                  </div>
                </div>
              )}
            </>
          )}
        </div>
      </div>

      <ToastManager toasts={toasts}/>

      {previewFile && (
        <ComparisonModal
          file={previewFile}
          config={cfg}
          onClose={() => setPreviewFile(null)}
        />
      )}

      {savePresetModal && (
        <SavePresetModal snapshot={savePresetModal.snapshot} lang={lang} t={t}
                         onCancel={()=>setSavePresetModal(null)}
                         onSave={handleSavePreset}/>
      )}

      {editPresetModal && (
        <EditPresetModal preset={editPresetModal} lang={lang} t={t}
                         onCancel={()=>setEditPresetModal(null)}
                         onSave={handleEditPreset}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<LangRoot/>);
</script>
</body>
</html>
